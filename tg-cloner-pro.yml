name: "TG Clone Pro Runner"
description: >
  Receive tg-cl.tar.gz and config.json via a temporary Telegram delivery bot,
  unpack the package, place config.json, and run ./tg-cl bot until idle exit
  or manual workflow cancellation.

author: "tg-cloner"

branding:
  icon: "send"
  color: "blue"

inputs:
  telegram_bot_token:
    description: >
      Telegram bot token used ONLY to receive tg-cl.tar.gz and config.json.
      Never passed to ./tg-cl after delivery completes.
    required: true
  telegram_allowed_user_ids:
    description: >
      Optional comma-separated Telegram user IDs allowed to deliver files.
      If empty, the first sender is accepted.
    required: false
    default: ""
  idle_timeout_seconds:
    description: >
      Stop ./tg-cl when there is no CPU, disk I/O, or meaningful network
      activity for this many seconds (default 900 = 15 minutes).
    required: false
    default: "900"
  delivery_timeout_seconds:
    description: >
      Maximum seconds to wait for both files from the delivery bot
      (default 1800 = 30 minutes).
    required: false
    default: "1800"
  idle_poll_seconds:
    description: How often the watchdog samples activity (seconds).
    required: false
    default: "30"
  idle_net_noise_bytes:
    description: >
      Network byte deltas at or below this value are treated as noise
      (long-poll chatter) and do not count as activity.
    required: false
    default: "4096"

runs:
  using: "composite"
  steps:
    - name: Run TG Clone Pro
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ inputs.telegram_bot_token }}
        TELEGRAM_ALLOWED_USER_IDS: ${{ inputs.telegram_allowed_user_ids }}
        IDLE_TIMEOUT_SECONDS: ${{ inputs.idle_timeout_seconds }}
        DELIVERY_TIMEOUT_SECONDS: ${{ inputs.delivery_timeout_seconds }}
        IDLE_POLL_SECONDS: ${{ inputs.idle_poll_seconds }}
        IDLE_NET_NOISE_BYTES: ${{ inputs.idle_net_noise_bytes }}
      run: |
        set -euo pipefail
        chmod +x "${{ github.action_path }}/scripts/entrypoint.sh"
        chmod +x "${{ github.action_path }}/scripts/"*.py
        exec "${{ github.action_path }}/scripts/entrypoint.sh"
